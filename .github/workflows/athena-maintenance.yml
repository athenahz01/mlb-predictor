name: Athena evaluation refresh

on:
  schedule:
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: athena-evaluation-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Refresh completed results
        run: python -m ingest.pull_results --season $(date -u +%Y)
      - name: Rebuild reproducible baseline artifact
        run: python -m evaluation.generate_baseline
      - uses: actions/upload-artifact@v4
        with:
          name: athena-baseline
          path: |
            reports/baseline.md
            reports/baseline.json
          retention-days: 30
