name: MLB daily slate

# Runs every 2 hours across the afternoon/evening (UTC) so it catches each game's
# lineup as it posts. Also resolves finished games and refreshes the dashboard.
on:
  schedule:
    - cron: '0 16,18,20,22,0,2 * * *'   # ~noon-10pm ET
  workflow_dispatch:                     # manual "Run workflow" button

permissions:
  contents: write                        # allow committing the updated ledger back

concurrency:
  group: slate                           # never let two runs push at once
  cancel-in-progress: false

jobs:
  slate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy pandas requests pyarrow

      - name: Resolve finished games
        run: python -m ingest.pull_results --season 2026 || echo "no results yet"

      # --xrates SHIPPED 2026-07-23: paired bootstrap vs observed rates over 60
      # recent games -- HR Brier p=0.001, TB sq-err p=0.032, both favour xrates.
      # --env / --workload / --availability are built but NOT yet gated: do not add.
      - name: Run slate (confirmed lineups only)
        run: python run_slate.py --confirmed-only --season 2025 --blend --xrates

      - name: Export dashboard
        run: python export_dashboard.py --season 2026

      - name: Commit and push
        run: |
          git config user.name "slate-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ledger/ledger.json dashboard/ledger.json dashboard/summary.json
          if git diff --staged --quiet; then
            echo "nothing new to commit"
          else
            git commit -m "auto slate $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi