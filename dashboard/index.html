const hasMarket = (r) => r.market_home_win_pct != null && !isNaN(r.market_home_win_pct);
const edgeOf = (r) => {
  if (r.edge != null && !isNaN(r.edge)) return Math.round(Math.abs(r.edge));
  if (!hasMarket(r) || r.model_home_win_pct == null) return null;
  return Math.round(Math.abs(r.model_home_win_pct - r.market_home_win_pct));
};
const isContrarian = (r, thr) => { const e = edgeOf(r); return e != null && e >= thr; };

function brier(finals, key) {
  if (!finals.length) return null;
  const s = finals.reduce((acc, r) => {
    const p = r[key] / 100, a = outcome(r);
    return acc + (p - a) * (p - a);
  }, 0);
  return s / finals.length;
}
function calibrationTrend(finals) {
  const sorted = [...finals].sort((a, b) =>
    (a.date + a.logged_at).localeCompare(b.date + b.logged_at));
  let sm = 0, sk = 0; const model = [], market = [];
  sorted.forEach((r, i) => {
    const a = outcome(r);
    sm += (r.model_home_win_pct / 100 - a) ** 2;
    sk += (r.market_home_win_pct / 100 - a) ** 2;
    model.push(sm / (i + 1)); market.push(sk / (i + 1));
  });
  return { model, market, n: sorted.length };
}

function ProbBar({ pct, color, track, baseLine, delay = 0, animate }) {
  const safe = (pct == null || isNaN(+pct)) ? 0 : Math.max(0, Math.min(100, +pct));
  const [w, setW] = useState(animate ? 0 : safe);
  useEffect(() => {
    if (!animate) { setW(safe); return; }
    const id = requestAnimationFrame(() => setW(safe));
    return () => cancelAnimationFrame(id);
  }, [safe, animate]);
  return (
    <div style={{ position:"relative", height:7, borderRadius:99, background:track, overflow:"hidden" }}>
      <div style={{ position:"absolute", left:0, top:0, bottom:0, width:`${w}%`, background:color, borderRadius:99,
        transformOrigin:"left center",
        transition: animate ? `width 0.6s cubic-bezier(.2,.8,.2,1) ${delay}s` : "none" }} />
      <div style={{ position:"absolute", left:"50%", top:-1, bottom:-1, width:1, background:baseLine }} />
    </div>
  );
}

  const [err, setErr] = useState(false);
  if (err || !abbr) {
    return <span style={{ width:size-2, height:size-2, borderRadius:3, background:teamColor(abbr),

  return <img src={logoUrl(abbr)} alt="" width={size} height={size} loading="lazy"
    onError={() => setErr(true)}
    style={{ display:"block", flex:"0 0 auto", objectFit:"contain" }} />;
}

function PropItem({ t, label, value, tag }) {

function GameRow({ r, t, thr, animate, idx }) {
  const final = isFinal(r);
  const contra = isContrarian(r, thr);
  const model = r.model_home_win_pct;
  const market = r.market_home_win_pct;

  const statusLabel = status === "nailed" ? "NAILED" : status === "missed" ? "MISSED" : "UPCOMING";

    if (!r.logged_at) return "";
    const d = new Date(r.logged_at);
    if (isNaN(d)) return "";
    return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  })();

  const hasProps = propItems.length > 0 || hrList.length > 0;
  const [open, setOpen] = useState(false);

  return (
    <div style={{

      background: contra ? t.contraRow : "transparent",

function Pill({ label, count, active, t, onClick }) {
  return (
    <button onClick={onClick} className="mono"
      style={{ ...T.label, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:7,
        minHeight:34, padding:"0 14px", borderRadius:7,
        background: active ? t.model : "transparent",
        border: `1px solid ${active ? t.model : t.line}`,
        color: active ? t.pillActiveLabel : t.dim,
        transition:"background .15s, color .15s, border-color .15s" }}>
      <span>{label}</span>
      {count != null && <span style={{ opacity:0.6, fontWeight:400 }}>{count}</span>}
    </button>
  );
}
function GhostBtn({ children, t, onClick, label }) {
  return (
    <button onClick={onClick} className="mono" aria-label={label}
      style={{ ...T.label, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:7,
        minHeight:34, padding:"0 13px", borderRadius:7, background:"transparent",
        border:`1px solid ${t.line}`, color:t.dim }}>{children}</button>
  );
}

function StatCell({ t, children, span, accent }) {
  return (
    <div style={{ background:t.panel, border:`1px solid ${t.line}`, borderRadius:12,
      padding:"clamp(18px,2.5vw,24px)", gridColumn: span ? `span ${span}` : "auto",
      display:"flex", flexDirection:"column",
      borderTop: accent ? `2px solid ${accent}` : `1px solid ${t.line}` }}>{children}</div>
  );
}
function BrierCell({ t, bModel, bMarket, nCompared }) {
  const ready = bModel != null && bMarket != null && nCompared > 0;
  const modelWins = ready && bModel <= bMarket;
  const diff = ready ? Math.abs(bModel - bMarket) : null;
  return (
    <StatCell t={t} span={2} accent={t.market}>
      <span className="mono" style={{ ...T.eyebrow, color:t.dim, marginBottom:14 }}>Calibration · Brier · lower wins</span>
      {ready ? (
        <>
          <div style={{ display:"flex", alignItems:"baseline", gap:18, flexWrap:"wrap" }}>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              <span className="mono" style={{ ...T.hero, color:t.model }}>{fmt3(bModel)}</span>
              <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Model</span>
            </div>
            <span className="mono" style={{ ...T.eyebrow, color:t.faint, alignSelf:"center" }}>vs</span>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              <span className="mono" style={{ ...T.hero, color:t.market }}>{fmt3(bMarket)}</span>
              <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Market</span>
            </div>
          </div>
          <span className="mono" style={{ ...T.label, fontWeight:500, color:t.body, marginTop:16 }}>
            {diff != null && diff >= 0.0005 ? <>{modelWins ? "Model" : "Market"} ahead by {diff.toFixed(3)} · </> : null}
            over {nCompared} {nCompared === 1 ? "game" : "games"} with market
          </span>
        </>
      ) : (
        <>
          <span className="mono" style={{ fontFamily:'"IBM Plex Mono", monospace', fontWeight:600,
            fontSize:"clamp(18px,2.6vw,24px)", color:t.dim, lineHeight:1.1, marginTop:2 }}>awaiting market data</span>
          <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint, marginTop:14 }}>
            no games with a market price yet
          </span>
        </>
      )}
    </StatCell>
  );
}
function RecordCell({ t, wins, losses, total }) {
  const n = total != null ? total : wins + losses;
  return (
    <StatCell t={t}>
      <span className="mono" style={{ ...T.eyebrow, color:t.dim, marginBottom:14 }}>Pick record</span>
      <span className="mono" style={{ ...T.stat, color:t.ink }}>{wins}<span style={{color:t.faint}}>–</span>{losses}</span>
      <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint, marginTop:10 }}>over {n} finals</span>
    </StatCell>
  );
}
function AccuracyCell({ t, acc, animate }) {
  return (
    <StatCell t={t}>
      <span className="mono" style={{ ...T.eyebrow, color:t.dim, marginBottom:14 }}>Accuracy</span>
      <span className="mono" style={{ ...T.stat, color:t.ink, marginBottom:14 }}>{acc == null ? "—" : acc.toFixed(1)}<span style={{fontSize:"0.55em", color:t.dim}}>%</span></span>
      <div style={{ marginTop:"auto" }}>
        <ProbBar pct={acc || 0} color={t.model} track={t.track} baseLine={t.baseLine} animate={animate} />
      </div>
    </StatCell>
  );
}
function TrendCell({ t, trend, animate }) {
  const W = 520, H = 150, padL = 8, padR = 8, padT = 10, padB = 8;
  const ready = trend.n >= 2;
  const all = ready ? [...trend.model, ...trend.market] : [0, 0.3];
  let lo = Math.min(...all), hi = Math.max(...all);
  if (hi - lo < 0.02) { hi += 0.01; lo -= 0.01; }
  const pad = (hi - lo) * 0.15; lo -= pad; hi += pad;
  const x = (i) => padL + (i / (trend.n - 1)) * (W - padL - padR);
  const y = (v) => padT + (1 - (v - lo) / (hi - lo)) * (H - padT - padB);
  const line = (arr) => arr.map((v, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const area = ready
    ? `${line(trend.model)} L${x(trend.n-1).toFixed(1)},${(H-padB).toFixed(1)} L${padL},${(H-padB).toFixed(1)} Z`
    : "";
  const [dash, setDash] = useState(animate ? 1 : 0);
  useEffect(() => { if (animate) { const id = requestAnimationFrame(()=>setDash(0)); return ()=>cancelAnimationFrame(id);} }, [animate]);
  return (
    <StatCell t={t} span={2}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:8, flexWrap:"wrap", gap:8 }}>
        <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Calibration trend · cumulative Brier</span>
        <span style={{ display:"inline-flex", gap:14 }}>
          <span className="mono" style={{...T.label, fontWeight:400, color:t.body, display:"inline-flex", alignItems:"center", gap:6}}>
            <span style={{width:14, height:2, background:t.model, display:"inline-block"}}/>Model</span>
          <span className="mono" style={{...T.label, fontWeight:400, color:t.body, display:"inline-flex", alignItems:"center", gap:6}}>
            <span style={{width:14, height:2, background:t.market, display:"inline-block"}}/>Market</span>
        </span>
      </div>
      {ready ? (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="none" style={{ display:"block", height:"clamp(120px,18vw,160px)" }}>
          <path d={area} fill={t.modelSoft} stroke="none" style={{ opacity: animate ? (dash?0:1):1, transition:"opacity .6s ease .2s" }}/>
          <path d={line(trend.market)} fill="none" stroke={t.market} strokeWidth="1.6" strokeLinejoin="round"
            style={{ strokeDasharray:1400, strokeDashoffset: dash*1400, transition:"stroke-dashoffset .9s cubic-bezier(.2,.8,.2,1)" }}/>
          <path d={line(trend.model)} fill="none" stroke={t.model} strokeWidth="1.8" strokeLinejoin="round"
            style={{ strokeDasharray:1400, strokeDashoffset: dash*1400, transition:"stroke-dashoffset .9s cubic-bezier(.2,.8,.2,1) .08s" }}/>
        </svg>
      ) : (
        <div style={{ height:"clamp(120px,18vw,160px)", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint }}>Needs ≥2 finals to render</span>
        </div>
      )}
    </StatCell>
  );
}

function AwaitingPanel({ t, rows }) {
  const upcoming = rows.filter((r) => !isFinal(r)).length;
  const withMkt = rows.filter((r) => r.market_home_win_pct != null).length;
  return (
    <section style={{ background:t.panel, border:`1px solid ${t.line}`, borderTop:`2px solid ${t.market}`,
      borderRadius:12, padding:"clamp(22px,3.5vw,34px)", marginBottom:"clamp(22px,3vw,32px)" }}>
      <span className="mono" style={{ ...T.eyebrow, color:t.market }}>Calibration · Brier</span>
      <h2 className="disp" style={{ ...T.display, fontWeight:700, fontSize:"clamp(22px,3vw,30px)", color:t.ink, margin:"12px 0 0" }}>Awaiting first finals</h2>
      <p style={{ ...T.body, color:t.body, maxWidth:600, margin:"12px 0 22px" }}>
        Model-versus-market Brier, pick record, accuracy and the calibration trend appear here
        once today&rsquo;s games resolve. Every probability is logged before first pitch.
      </p>
      <div style={{ display:"flex", gap:"clamp(28px,6vw,64px)", flexWrap:"wrap" }}>
        <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
          <span className="mono" style={{ ...T.stat, fontSize:"clamp(28px,4vw,36px)", color:t.ink }}>{upcoming}</span>
          <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Games logged today</span>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
          <span className="mono" style={{ ...T.stat, fontSize:"clamp(28px,4vw,36px)", color: withMkt ? t.ink : t.faint }}>{withMkt}</span>
          <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>With market price</span>
        </div>
      </div>
      {withMkt === 0 && upcoming > 0 && (
        <p style={{ ...T.label, fontWeight:400, color:t.faint, margin:"22px 0 0" }}>
          Market prices not pulled yet — showing model probabilities only.
        </p>
      )}
    </section>
  );
}

const FILTERS = [
  { key:"all", label:"ALL" },
  { key:"nailed", label:"NAILED" },
  { key:"upcoming", label:"UPCOMING" },
];

function App() {
  const [dark, setDark] = useState(false);
  const [rows, setRows] = useState(() => readEmbedded());
  const [filter, setFilter] = useState("all");
  const [thr, setThr] = useState(10);
  const [lastSync, setLastSync] = useState(null);
  const [status, setStatus] = useState("embedded");
  const [summary, setSummary] = useState(null);
  const firstRender = useRef(true);
  const animate = !prefersReduced();
  const t = dark ? THEMES.dark : THEMES.light;

  const load = useCallback(async () => {
    try {
      const res = await fetch("./ledger.json", { cache: "no-store" });
      if (!res.ok) throw new Error("http " + res.status);
      const data = await res.json();
      if (Array.isArray(data) && data.length) {
        setRows(data); setStatus("live"); setLastSync(new Date());
      }
    } catch (e) {
      setStatus((s) => (s === "live" ? "live" : "embedded"));
    }
    try {
      const res = await fetch("./summary.json", { cache: "no-store" });
      if (res.ok) {
        const s = await res.json();
        if (s && typeof s === "object") setSummary(s);
      }
    } catch (e) { /* keep prior summary */ }
  }, []);

  useEffect(() => { load(); const id = setInterval(load, 30000); return () => clearInterval(id); }, [load]);
  useEffect(() => { document.body.style.background = t.bg; }, [t]);
  useEffect(() => { firstRender.current = false; }, []);

  const finals = useMemo(() => rows.filter(isFinal), [rows]);
  const marketFinals = useMemo(() => finals.filter(hasMarket), [finals]);

  const cWins = finals.filter((r) => r.pick_correct).length;
  const bModel   = summary && summary.model_brier   != null ? summary.model_brier   : brier(marketFinals, "model_home_win_pct");
  const bMarket  = summary && summary.market_brier  != null ? summary.market_brier  : brier(marketFinals, "market_home_win_pct");
  const nCompared = summary && summary.n_compared   != null ? summary.n_compared    : marketFinals.length;
  const wins   = summary && summary.picks_correct != null ? summary.picks_correct : cWins;
  const total  = summary && summary.picks_total   != null ? summary.picks_total   : finals.length;
  const losses = Math.max(0, total - wins);
  const acc    = summary && summary.accuracy != null ? summary.accuracy * 100 : (total ? (wins / total) * 100 : null);
  const trend  = useMemo(() => calibrationTrend(marketFinals), [marketFinals]);

  const showScoreboard = (summary && summary.n_finals > 0) || finals.length > 0;

  const counts = {
    all: rows.length,
    nailed: finals.filter((r) => r.pick_correct).length,
    upcoming: rows.filter((r) => !isFinal(r)).length,
  };
  const shown = rows.filter((r) => {
    if (filter === "all") return true;
    if (filter === "nailed") return isFinal(r) && r.pick_correct;
    if (filter === "upcoming") return !isFinal(r);
    return true;
  });
  const groups = useMemo(() => {
    const m = new Map();
    shown.forEach((r) => { if (!m.has(r.date)) m.set(r.date, []); m.get(r.date).push(r); });
    return [...m.entries()].sort((a, b) => b[0].localeCompare(a[0]));
  }, [shown]);

  const gutter = "clamp(16px,4vw,40px)";

  return (
    <div style={{ background:t.bg, color:t.body, minHeight:"100vh", paddingBottom:48,
      transition:"background .25s, color .25s" }}>

      <div style={{ height:3, background:t.market }} />

      <header style={{ position:"sticky", top:0, zIndex:30, background:t.header,
        borderBottom:`1px solid ${t.line}` }}>
        <div style={{ maxWidth:1080, margin:"0 auto", padding:`13px ${gutter}`,
          display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexWrap:"wrap" }}>
          <div style={{ display:"flex", alignItems:"center", gap:11 }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={t.ink} strokeWidth="2.2" strokeLinejoin="round">
              <rect x="12" y="2.5" width="13.4" height="13.4" transform="rotate(45 12 2.5)" rx="2"/>
            </svg>
            <span className="mono" style={{ ...T.label, letterSpacing:"0.12em", color:t.ink, fontWeight:700 }}>
              MODEL <span style={{ color:t.market }}>vs</span> MARKET
            </span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
            <span className="mono" style={{ ...T.eyebrow, color:t.dim, display:"inline-flex", alignItems:"center", gap:7 }}>
              <span style={{ width:6, height:6, borderRadius:99,
                background: status==="live" ? "#2BBF6F" : t.faint }} />
              {status === "live" ? "LIVE" : "SNAPSHOT"}
              {lastSync && <span style={{ color:t.faint, marginLeft:2 }}>· {lastSync.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}</span>}
            </span>
            <GhostBtn t={t} onClick={load} label="Refresh">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block"}}>
                <path d="M20 11A8 8 0 1 0 18 17"/><path d="M20 5v6h-6"/>
              </svg>Refresh
            </GhostBtn>
            <GhostBtn t={t} onClick={() => setDark((d) => !d)} label="Toggle theme">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block"}}>
                {dark
                  ? <g><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></g>
                  : <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/>}
              </svg>{dark ? "Light" : "Dark"}
            </GhostBtn>
          </div>
        </div>
      </header>

      <main style={{ maxWidth:1080, margin:"0 auto", padding:`clamp(26px,4vw,42px) ${gutter} 0` }}>

        <div style={{ marginBottom:"clamp(22px,3vw,32px)" }}>
          <span className="mono" style={{ ...T.eyebrow, color:t.market }}>MLB · out-of-sample calibration</span>
          <h1 className="disp" style={{ ...T.display, fontSize:"clamp(34px,6vw,60px)", color:t.ink, margin:"10px 0 0" }}>Calibration Ledger</h1>
          <p style={{ ...T.body, color:t.body, maxWidth:580, margin:"12px 0 0" }}>
            Every model probability is logged before first pitch, then scored against the market in public.
            The metric is the accuracy of the probability — not profit, and never a pick.
          </p>
        </div>

        {showScoreboard ? (
          <section style={{ display:"grid", gap:"clamp(14px,2vw,18px)",
            gridTemplateColumns:"repeat(auto-fit, minmax(232px,1fr))",
            marginBottom:"clamp(22px,3vw,32px)" }}>
            <BrierCell t={t} bModel={bModel} bMarket={bMarket} nCompared={nCompared} />
            <RecordCell t={t} wins={wins} losses={losses} total={total} />
            <AccuracyCell t={t} acc={acc} animate={animate} />
            <TrendCell t={t} trend={trend} animate={animate} />
          </section>
        ) : (
          <AwaitingPanel t={t} rows={rows} />
        )}

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:14,
          flexWrap:"wrap", marginBottom:14 }}>
          <div style={{ display:"flex", gap:9, flexWrap:"wrap" }}>
            {FILTERS.map((f) => (
              <Pill key={f.key} label={f.label} count={counts[f.key]} active={filter===f.key} t={t}
                onClick={() => setFilter(f.key)} />
            ))}
          </div>
          <label style={{ display:"inline-flex", alignItems:"center", gap:10 }}>
            <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Contrarian ≥ {thr}</span>
            <input type="range" min="5" max="25" value={thr} onChange={(e)=>setThr(+e.target.value)}
              style={{ accentColor:t.market, width:108 }} />
          </label>
        </div>

        <section style={{ background:t.panel, border:`1px solid ${t.line}`, borderRadius:12, overflow:"hidden" }}>
          {groups.length === 0 && (
            <div style={{ padding:"40px 20px", textAlign:"center" }}>
              <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint }}>No games match this filter.</span>
            </div>
          )}
          {groups.map(([date, gs]) => (
            <div key={date}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"10px 20px", background:t.band, borderBottom:`1px solid ${t.line}`,
                borderTop:`1px solid ${t.line}` }}>
                <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>{fmtDate(date)}</span>
                <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint }}>{gs.length} {gs.length===1?"game":"games"}</span>
              </div>
              {gs.map((r, i) => (
                <GameRow key={r.away+r.home+r.date+i} r={r} t={t} thr={thr}
                  animate={animate && firstRender.current} idx={i} />
              ))}
            </div>
          ))}
        </section>

        <footer style={{ display:"flex", justifyContent:"space-between", gap:16, flexWrap:"wrap",
          marginTop:"clamp(24px,4vw,40px)", paddingTop:20, borderTop:`1px solid ${t.line}` }}>
          <span className="mono" style={{ ...T.eyebrow, color:t.faint }}>MODEL vs MARKET · Calibration Ledger</span>
          <span className="mono" style={{ ...T.eyebrow, color:t.faint }}>Not betting advice — calibration tracking only</span>
        </footer>
      </main>
    </div>
  );
}

function readEmbedded() {
  try { return JSON.parse(document.getElementById("embedded-ledger").textContent); }
  catch (e) { return []; }
}
function fmtDate(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((dt - today) / 86400000);
  const wd = dt.toLocaleDateString([], { weekday:"short" });
  const md = dt.toLocaleDateString([], { month:"short", day:"numeric" });
  const tag = diff === 0 ? "TODAY" : diff === -1 ? "YESTERDAY" : "";
  return `${tag ? tag + " · " : ""}${wd} ${md}`.toUpperCase();
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
