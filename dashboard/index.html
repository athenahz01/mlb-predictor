<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ============================================================
   §02  COLOR TOKENS — two skins, one role map
   ============================================================ */
const THEMES = {
  light: { // WHITE (default)
    name: "light",
    bg: "#F4F6FA", panel: "#FFFFFF", headerBg: "rgba(244,246,250,0.82)",
    line: "#D9DFEA", lineSoft: "#E8ECF3", track: "#E6EAF1", baseLine: "#BCC6D6",
    ink: "#041E42", body: "#35476B", dim: "#6E7E9C", faint: "#9DA9BE",
    model: "#041E42", modelSoft: "rgba(4,30,66,0.10)", market: "#BF0D3E",
    nailed: "#041E42", missed: "#BF0D3E", upcoming: "#5E6F8E",
    contraRow: "rgba(191,13,62,0.07)",
    pillActiveLabel: "#FFFFFF",
  },
  dark: { // BLUE
    name: "dark",
    bg: "#041E42", panel: "#0A2A52", headerBg: "rgba(4,30,66,0.82)",
    line: "#234A7A", lineSoft: "#16365F", track: "#0E2B50", baseLine: "#3E5E8E",
    ink: "#FFFFFF", body: "#C8D6EE", dim: "#8AA0C8", faint: "#5E78A6",
    model: "#FFFFFF", modelSoft: "rgba(255,255,255,0.12)", market: "#BF0D3E",
    nailed: "#FFFFFF", missed: "#FF536B", upcoming: "#9DB4D8",
    contraRow: "rgba(191,13,62,0.12)",
    pillActiveLabel: "#06140C",
  },
};

/* §07  MLB team color map (chips) */
const TEAM_COLORS = {
  ARI:"#A71930", ATL:"#CE1141", BAL:"#DF4601", BOS:"#BD3039", CHC:"#0E3386",
  CWS:"#27251F", CIN:"#C6011F", CLE:"#0C2340", COL:"#33006F", DET:"#0C2340",
  HOU:"#EB6E1F", KC:"#004687", LAA:"#BA0021", LAD:"#005A9C", MIA:"#00A3E0",
  MIL:"#12284B", MIN:"#002B5C", NYM:"#FF5910", NYY:"#0C2340", OAK:"#003831",
  PHI:"#E81828", PIT:"#FDB827", SD:"#2F241D", SF:"#FD5A1E", SEA:"#0C2C56",
  STL:"#C41E3A", TB:"#092C5C", TEX:"#003278", TOR:"#134A8E", WSH:"#AB0003",
};
const teamColor = (abbr) => TEAM_COLORS[abbr] || "#8893A3";

/* §03  Type ramp */
const T = {
  hero:   { fontFamily:'"IBM Plex Mono", monospace', fontWeight:700, fontSize:"clamp(30px,5.5vw,40px)", lineHeight:0.9, fontVariantNumeric:"tabular-nums" },
  stat:   { fontFamily:'"IBM Plex Mono", monospace', fontWeight:700, fontSize:"clamp(26px,3.5vw,34px)", lineHeight:1, fontVariantNumeric:"tabular-nums" },
  heading:{ fontFamily:'"IBM Plex Sans", sans-serif', fontWeight:700, fontSize:"clamp(22px,3vw,30px)", lineHeight:1.1 },
  rowVal: { fontFamily:'"IBM Plex Mono", monospace', fontWeight:600, fontSize:"14.5px", fontVariantNumeric:"tabular-nums" },
  label:  { fontFamily:'"IBM Plex Mono", monospace', fontWeight:600, fontSize:"11px", letterSpacing:"0.04em", fontVariantNumeric:"tabular-nums" },
  eyebrow:{ fontFamily:'"IBM Plex Mono", monospace', fontWeight:500, fontSize:"10px", letterSpacing:"0.16em", textTransform:"uppercase" },
  body:   { fontFamily:'"IBM Plex Sans", sans-serif', fontWeight:400, fontSize:"14px", lineHeight:1.5 },
};

/* ============================================================
   §07 / §08  Derived values — computed client-side, exactly per spec
   ============================================================ */
const isFinal = (r) => r.status === "final";
const outcome = (r) => (r.winner === r.home ? 1 : 0);              // home win = 1
const edgeOf = (r) => (r.edge != null ? r.edge
  : Math.round(Math.abs(r.model_home_win_pct - r.market_home_win_pct)));
const isContrarian = (r, thr) => edgeOf(r) >= thr;

function brier(finals, key) { // key: model_home_win_pct | market_home_win_pct
  if (!finals.length) return null;
  const s = finals.reduce((acc, r) => {
    const p = r[key] / 100, a = outcome(r);
    return acc + (p - a) * (p - a);
  }, 0);
  return s / finals.length;
}

function calibrationTrend(finals) { // cumulative Brier running mean, sorted by date
  const sorted = [...finals].sort((a, b) =>
    (a.date + a.logged_at).localeCompare(b.date + b.logged_at));
  let sm = 0, sk = 0;
  const model = [], market = [];
  sorted.forEach((r, i) => {
    const a = outcome(r);
    sm += (r.model_home_win_pct / 100 - a) ** 2;
    sk += (r.market_home_win_pct / 100 - a) ** 2;
    model.push(sm / (i + 1));
    market.push(sk / (i + 1));
  });
  return { model, market, n: sorted.length };
}

const fmt3 = (x) => (x == null ? "—" : x.toFixed(3));
const prefersReduced = () =>
  window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ============================================================
   Status icons — stroked SVG, 2.4px round caps
   ============================================================ */
function Icon({ kind, color, size = 13 }) {
  const common = { width:size, height:size, viewBox:"0 0 24 24", fill:"none",
    stroke:color, strokeWidth:2.4, strokeLinecap:"round", strokeLinejoin:"round",
    style:{ display:"block", flex:"0 0 auto" } };
  if (kind === "nailed") return <svg {...common}><path d="M4 12.5l5 5L20 6"/></svg>;
  if (kind === "missed") return <svg {...common}><path d="M6 6l12 12M18 6L6 18"/></svg>;
  return <svg {...common}><circle cx="12" cy="12" r="8"/><path d="M12 8v4.5l3 2"/></svg>; // clock
}
function Bolt({ color, size = 12 }) {
  return (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}
    style={{ display:"block", flex:"0 0 auto" }}><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>);
}

/* ============================================================
   Probability bar — 7px track, r99, 50% baseline tick, scaleX grow
   ============================================================ */
function ProbBar({ pct, color, track, baseLine, delay = 0, animate }) {
  const [w, setW] = useState(animate ? 0 : pct);
  useEffect(() => {
    if (!animate) { setW(pct); return; }
    const id = requestAnimationFrame(() => setW(pct));
    return () => cancelAnimationFrame(id);
  }, [pct, animate]);
  return (
    <div style={{ position:"relative", height:7, borderRadius:99, background:track, overflow:"hidden" }}>
      <div style={{
        position:"absolute", inset:0, width:`${w}%`, background:color, borderRadius:99,
        transformOrigin:"left center",
        transition: animate ? `width 0.6s cubic-bezier(.2,.8,.2,1) ${delay}s` : "none",
      }} />
      {/* 50% coin-flip reference tick */}
      <div style={{ position:"absolute", left:"50%", top:-1, bottom:-1, width:1, background:baseLine }} />
    </div>
  );
}

/* ============================================================
   Team chip  — colored square (r2) + abbr
   ============================================================ */
function TeamChip({ abbr, color }) {
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
      <span style={{ width:9, height:9, borderRadius:2, background:teamColor(abbr), flex:"0 0 auto" }} />
      <span className="mono" style={{ ...T.rowVal, color }}>{abbr}</span>
    </span>
  );
}

/* ============================================================
   Game row — flex-wrap, two prob rows, edge col, status col
   ============================================================ */
function GameRow({ r, t, thr, animate, idx }) {
  const final = isFinal(r);
  const contra = isContrarian(r, thr);
  const model = r.model_home_win_pct;
  const market = r.market_home_win_pct;
  const e = edgeOf(r);
  const status = !final ? "upcoming" : (r.pick_correct ? "nailed" : "missed");
  const statusColor = t[status];
  const statusLabel = status === "nailed" ? "NAILED" : status === "missed" ? "MISSED" : "UPCOMING";
  const loggedTime = (() => {
    const m = (r.logged_at || "").match(/T(\d{2}):(\d{2})/);
    if (!m) return "";
    let h = +m[1]; const ap = h >= 12 ? "PM" : "AM"; h = h % 12 || 12;
    return `${h}:${m[2]} ${ap}`;
  })();

  return (
    <div style={{
      display:"flex", flexWrap:"wrap", alignItems:"center", gap:"14px 20px",
      padding:"15px 18px",
      borderBottom:`1px solid ${t.lineSoft}`,
      background: contra ? t.contraRow : "transparent",
    }}>
      {/* matchup */}
      <div style={{ display:"flex", alignItems:"center", gap:8, minWidth:138, flex:"0 0 auto" }}>
        <TeamChip abbr={r.away} color={t.body} />
        <span className="mono" style={{ ...T.label, color:t.faint }}>@</span>
        <TeamChip abbr={r.home} color={t.ink} />
        {contra && <span style={{ marginLeft:2 }}><Bolt color={t.market} /></span>}
      </div>

      {/* probability bars */}
      <div style={{ flex:"1 1 200px", minWidth:160, display:"flex", flexDirection:"column", gap:6 }}>
        <ProbBar pct={model} color={t.model} track={t.track} baseLine={t.baseLine} animate={animate} delay={Math.min(idx*0.02,0.3)} />
        <ProbBar pct={market} color={t.market} track={t.track} baseLine={t.baseLine} animate={animate} delay={Math.min(idx*0.02,0.3)+0.05} />
      </div>

      {/* percentages */}
      <div style={{ display:"flex", flexDirection:"column", gap:6, textAlign:"right", flex:"0 0 auto", minWidth:42 }}>
        <span className="mono" style={{ ...T.rowVal, color:t.ink }}>{model}%</span>
        <span className="mono" style={{ ...T.rowVal, color:t.market }}>{market}%</span>
      </div>

      {/* edge */}
      <div style={{ display:"flex", flexDirection:"column", gap:2, alignItems:"flex-start", flex:"0 0 auto", minWidth:38 }}>
        <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>EDGE</span>
        <span className="mono" style={{ ...T.stat, fontSize:"22px", color: contra ? t.market : t.ink }}>{e}</span>
      </div>

      {/* status */}
      <div style={{ display:"flex", flexDirection:"column", gap:3, alignItems:"flex-end", marginLeft:"auto", flex:"0 0 auto", minWidth:96 }}>
        <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <Icon kind={status} color={statusColor} />
          <span className="mono" style={{ ...T.label, color:statusColor }}>{statusLabel}</span>
        </span>
        <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint }}>
          {final ? `${r.away} ${r.away_score} · ${r.home} ${r.home_score}` : `logged ${loggedTime}`}
        </span>
      </div>
    </div>
  );
}

/* ============================================================
   Filter pill  — active fill = t.model, inactive transparent
   ============================================================ */
function Pill({ label, count, active, t, onClick }) {
  return (
    <button onClick={onClick} className="mono"
      style={{
        ...T.label, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:7,
        minHeight:32, padding:"0 14px", borderRadius:7,
        background: active ? t.model : "transparent",
        border: `1px solid ${active ? t.model : t.line}`,
        color: active ? t.pillActiveLabel : t.dim,
        transition:"background .15s, color .15s, border-color .15s",
      }}>
      <span>{label}</span>
      {count != null && <span style={{ opacity:0.6, fontWeight:400 }}>{count}</span>}
    </button>
  );
}

/* Theme toggle — same pill shape */
function ThemeToggle({ t, dark, onToggle }) {
  return (
    <button onClick={onToggle} className="mono" aria-label="Toggle theme"
      style={{ ...T.label, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:7,
        minHeight:32, padding:"0 14px", borderRadius:7, background:"transparent",
        border:`1px solid ${t.line}`, color:t.dim }}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block"}}>
        {dark
          ? <g><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></g>
          : <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/>}
      </svg>
      <span>{dark ? "Light" : "Dark"}</span>
    </button>
  );
}

/* ============================================================
   Scoreboard stat cells
   ============================================================ */
function StatCell({ t, children, span }) {
  return (
    <div style={{
      background:t.panel, border:`1px solid ${t.line}`, borderRadius:12,
      padding:"clamp(18px,2.5vw,24px)",
      gridColumn: span ? `span ${span}` : "auto",
      display:"flex", flexDirection:"column",
    }}>{children}</div>
  );
}

/* Brier head-to-head hero */
function BrierCell({ t, bModel, bMarket }) {
  const modelWins = bModel != null && bMarket != null && bModel <= bMarket;
  const diff = (bModel != null && bMarket != null) ? Math.abs(bModel - bMarket) : null;
  return (
    <StatCell t={t} span={2}>
      <span className="mono" style={{ ...T.eyebrow, color:t.dim, marginBottom:14 }}>Calibration · Brier</span>
      <div style={{ display:"flex", alignItems:"baseline", gap:18, flexWrap:"wrap" }}>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          <span className="mono" style={{ ...T.hero, color:t.model }}>{fmt3(bModel)}</span>
          <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Model</span>
        </div>
        <span className="mono" style={{ ...T.eyebrow, color:t.faint, alignSelf:"center" }}>vs</span>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          <span className="mono" style={{ ...T.hero, color:t.market }}>{fmt3(bMarket)}</span>
          <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Market</span>
        </div>
      </div>
      <span className="mono" style={{ ...T.label, fontWeight:500, color:t.body, marginTop:16 }}>
        {diff == null ? "Awaiting finals" :
          <>{modelWins ? "MODEL" : "MARKET"} ahead by {diff.toFixed(3)} · <span style={{color:t.dim}}>lower is better</span></>}
      </span>
    </StatCell>
  );
}

/* Pick record */
function RecordCell({ t, wins, losses }) {
  return (
    <StatCell t={t}>
      <span className="mono" style={{ ...T.eyebrow, color:t.dim, marginBottom:14 }}>Pick record</span>
      <span className="mono" style={{ ...T.stat, color:t.ink }}>{wins}<span style={{color:t.faint}}>–</span>{losses}</span>
      <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint, marginTop:10 }}>over {wins+losses} finals</span>
    </StatCell>
  );
}

/* Accuracy + bar */
function AccuracyCell({ t, acc, animate }) {
  return (
    <StatCell t={t}>
      <span className="mono" style={{ ...T.eyebrow, color:t.dim, marginBottom:14 }}>Accuracy</span>
      <span className="mono" style={{ ...T.stat, color:t.ink, marginBottom:14 }}>{acc == null ? "—" : acc.toFixed(1)}<span style={{fontSize:"0.55em", color:t.dim}}>%</span></span>
      <div style={{ marginTop:"auto" }}>
        <ProbBar pct={acc || 0} color={t.model} track={t.track} baseLine={t.baseLine} animate={animate} />
      </div>
    </StatCell>
  );
}

/* Calibration trend — two cumulative-Brier lines + soft model area */
function TrendCell({ t, trend, animate }) {
  const W = 520, H = 150, padL = 8, padR = 8, padT = 10, padB = 8;
  const ready = trend.n >= 2;
  const all = ready ? [...trend.model, ...trend.market] : [0, 0.3];
  let lo = Math.min(...all), hi = Math.max(...all);
  if (hi - lo < 0.02) { hi += 0.01; lo -= 0.01; }
  const pad = (hi - lo) * 0.15; lo -= pad; hi += pad;
  const x = (i) => padL + (i / (trend.n - 1)) * (W - padL - padR);
  const y = (v) => padT + (1 - (v - lo) / (hi - lo)) * (H - padT - padB);
  const line = (arr) => arr.map((v, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const area = ready
    ? `${line(trend.model)} L${x(trend.n-1).toFixed(1)},${(H-padB).toFixed(1)} L${padL},${(H-padB).toFixed(1)} Z`
    : "";
  const [dash, setDash] = useState(animate ? 1 : 0);
  useEffect(() => { if (animate) { const id = requestAnimationFrame(()=>setDash(0)); return ()=>cancelAnimationFrame(id);} }, [animate]);

  return (
    <StatCell t={t} span={2}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:8, flexWrap:"wrap", gap:8 }}>
        <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Calibration trend · cumulative Brier</span>
        <span style={{ display:"inline-flex", gap:14 }}>
          <span className="mono" style={{...T.label, fontWeight:400, color:t.body, display:"inline-flex", alignItems:"center", gap:6}}>
            <span style={{width:14, height:2, background:t.model, display:"inline-block"}}/>Model</span>
          <span className="mono" style={{...T.label, fontWeight:400, color:t.body, display:"inline-flex", alignItems:"center", gap:6}}>
            <span style={{width:14, height:2, background:t.market, display:"inline-block"}}/>Market</span>
        </span>
      </div>
      {ready ? (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="none" style={{ display:"block", height:"clamp(120px,18vw,160px)" }}>
          <path d={area} fill={t.modelSoft} stroke="none" style={{ opacity: animate ? (dash?0:1):1, transition:"opacity .6s ease .2s" }}/>
          <path d={line(trend.market)} fill="none" stroke={t.market} strokeWidth="1.6" strokeLinejoin="round"
            style={{ strokeDasharray:1400, strokeDashoffset: dash*1400, transition:"stroke-dashoffset .9s cubic-bezier(.2,.8,.2,1)" }}/>
          <path d={line(trend.model)} fill="none" stroke={t.model} strokeWidth="1.8" strokeLinejoin="round"
            style={{ strokeDasharray:1400, strokeDashoffset: dash*1400, transition:"stroke-dashoffset .9s cubic-bezier(.2,.8,.2,1) .08s" }}/>
        </svg>
      ) : (
        <div style={{ height:"clamp(120px,18vw,160px)", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint }}>Needs ≥2 finals to render</span>
        </div>
      )}
    </StatCell>
  );
}

/* ============================================================
   APP
   ============================================================ */
const FILTERS = [
  { key:"all", label:"ALL" },
  { key:"nailed", label:"NAILED" },
  { key:"upcoming", label:"UPCOMING" },
];

function App() {
  const [dark, setDark] = useState(false);            // light (white) default
  const [rows, setRows] = useState(() => readEmbedded());
  const [filter, setFilter] = useState("all");
  const [thr, setThr] = useState(10);                 // contrarianThreshold 5–25
  const [lastSync, setLastSync] = useState(null);
  const [status, setStatus] = useState("embedded");   // live | embedded | error
  const firstRender = useRef(true);
  const animate = !prefersReduced();

  const t = dark ? THEMES.dark : THEMES.light;

  /* poll ./ledger.json every 30s; fall back to embedded snapshot */
  const load = useCallback(async () => {
    try {
      const res = await fetch("./ledger.json", { cache: "no-store" });
      if (!res.ok) throw new Error("http " + res.status);
      const data = await res.json();
      if (Array.isArray(data) && data.length) {
        setRows(data); setStatus("live"); setLastSync(new Date());
      }
    } catch (e) {
      setStatus((s) => (s === "live" ? "live" : "embedded"));
    }
  }, []);

  useEffect(() => {
    load();
    const id = setInterval(load, 30000);
    return () => clearInterval(id);
  }, [load]);

  useEffect(() => { document.body.style.background = t.bg; }, [t]);
  useEffect(() => { firstRender.current = false; }, []);

  const finals = useMemo(() => rows.filter(isFinal), [rows]);
  const wins = finals.filter((r) => r.pick_correct).length;
  const losses = finals.length - wins;
  const acc = finals.length ? (wins / finals.length) * 100 : null;
  const bModel = brier(finals, "model_home_win_pct");
  const bMarket = brier(finals, "market_home_win_pct");
  const trend = useMemo(() => calibrationTrend(finals), [finals]);

  const counts = {
    all: rows.length,
    nailed: finals.filter((r) => r.pick_correct).length,
    upcoming: rows.filter((r) => !isFinal(r)).length,
  };

  const shown = rows.filter((r) => {
    if (filter === "all") return true;
    if (filter === "nailed") return isFinal(r) && r.pick_correct;
    if (filter === "upcoming") return !isFinal(r);
    return true;
  });

  /* group by date, newest first; upcoming (today) on top */
  const groups = useMemo(() => {
    const m = new Map();
    shown.forEach((r) => { if (!m.has(r.date)) m.set(r.date, []); m.get(r.date).push(r); });
    return [...m.entries()].sort((a, b) => b[0].localeCompare(a[0]));
  }, [shown]);

  const gutter = "clamp(16px,4vw,40px)";

  return (
    <div style={{ background:t.bg, color:t.body, minHeight:"100vh", paddingBottom:40,
      transition:"background .25s, color .25s" }}>

      {/* ---- sticky header ---- */}
      <header style={{ position:"sticky", top:0, zIndex:20,
        background:t.headerBg, backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)",
        borderBottom:`1px solid ${t.line}` }}>
        <div style={{ maxWidth:1080, margin:"0 auto", padding:`14px ${gutter}`,
          display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexWrap:"wrap" }}>
          <div style={{ display:"flex", alignItems:"center", gap:11 }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={t.ink} strokeWidth="2" strokeLinejoin="round">
              <rect x="12" y="2" width="14.14" height="14.14" transform="rotate(45 12 2)" rx="2"/>
            </svg>
            <span className="mono" style={{ ...T.label, letterSpacing:"0.1em", color:t.ink, fontWeight:700 }}>
              MODEL <span style={{ color:t.market }}>vs</span> MARKET
            </span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:14, flexWrap:"wrap" }}>
            <span className="mono" style={{ ...T.eyebrow, color:t.dim, display:"inline-flex", alignItems:"center", gap:7 }}>
              <span style={{ width:6, height:6, borderRadius:99,
                background: status==="live" ? "#2BBF6F" : t.faint,
                boxShadow: status==="live" ? "0 0 0 3px rgba(43,191,111,0.18)" : "none" }} />
              {status === "live" ? "LIVE" : "SNAPSHOT"}
              {lastSync && <span style={{ color:t.faint, marginLeft:2 }}>· {lastSync.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}</span>}
            </span>
            <button onClick={load} className="mono" aria-label="Refresh"
              style={{ ...T.label, cursor:"pointer", minHeight:32, padding:"0 12px", borderRadius:7,
                background:"transparent", border:`1px solid ${t.line}`, color:t.dim,
                display:"inline-flex", alignItems:"center", gap:7 }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"block"}}>
                <path d="M20 11A8 8 0 1 0 18 17"/><path d="M20 5v6h-6"/>
              </svg>
              Refresh
            </button>
            <ThemeToggle t={t} dark={dark} onToggle={() => setDark((d) => !d)} />
          </div>
        </div>
      </header>

      <main style={{ maxWidth:1080, margin:"0 auto", padding:`clamp(24px,4vw,40px) ${gutter} 0` }}>

        {/* ---- title ---- */}
        <div style={{ marginBottom:"clamp(20px,3vw,30px)" }}>
          <span className="mono" style={{ ...T.eyebrow, color:t.market }}>MLB · Out-of-sample calibration</span>
          <h1 style={{ ...T.heading, color:t.ink, margin:"10px 0 0" }}>Calibration ledger</h1>
          <p style={{ ...T.body, color:t.body, maxWidth:560, margin:"10px 0 0" }}>
            Model probabilities logged before first pitch, scored against the market in public.
            The metric is accuracy of probability — not profit, and never a pick.
          </p>
        </div>

        {/* ---- scoreboard ---- */}
        <section style={{
          display:"grid", gap:"clamp(14px,2vw,20px)",
          gridTemplateColumns:"repeat(auto-fit, minmax(232px,1fr))",
          marginBottom:"clamp(22px,3vw,32px)" }}>
          <BrierCell t={t} bModel={bModel} bMarket={bMarket} />
          <RecordCell t={t} wins={wins} losses={losses} />
          <AccuracyCell t={t} acc={acc} animate={animate} />
          <TrendCell t={t} trend={trend} animate={animate} />
        </section>

        {/* ---- controls ---- */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:14,
          flexWrap:"wrap", marginBottom:16 }}>
          <div style={{ display:"flex", gap:9, flexWrap:"wrap" }}>
            {FILTERS.map((f) => (
              <Pill key={f.key} label={f.label} count={counts[f.key]} active={filter===f.key} t={t}
                onClick={() => setFilter(f.key)} />
            ))}
          </div>
          <label style={{ display:"inline-flex", alignItems:"center", gap:10 }}>
            <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>Contrarian ≥ {thr}</span>
            <input type="range" min="5" max="25" value={thr} onChange={(e)=>setThr(+e.target.value)}
              style={{ accentColor:t.market, width:108 }} />
          </label>
        </div>

        {/* ---- game rows, grouped by date ---- */}
        <section style={{ background:t.panel, border:`1px solid ${t.line}`, borderRadius:14, overflow:"hidden" }}>
          {groups.length === 0 && (
            <div style={{ padding:"40px 18px", textAlign:"center" }}>
              <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint }}>No games match this filter.</span>
            </div>
          )}
          {groups.map(([date, gs]) => (
            <div key={date}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"11px 18px", background:t.headerBg, borderBottom:`1px solid ${t.lineSoft}`,
                position:"sticky", top:60, zIndex:5, backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)" }}>
                <span className="mono" style={{ ...T.eyebrow, color:t.dim }}>{fmtDate(date)}</span>
                <span className="mono" style={{ ...T.label, fontWeight:400, color:t.faint }}>{gs.length} {gs.length===1?"game":"games"}</span>
              </div>
              {gs.map((r, i) => (
                <GameRow key={r.away+r.home+r.date+i} r={r} t={t} thr={thr}
                  animate={animate && firstRender.current} idx={i} />
              ))}
            </div>
          ))}
        </section>

        {/* ---- footer ---- */}
        <footer style={{ display:"flex", justifyContent:"space-between", gap:16, flexWrap:"wrap",
          marginTop:"clamp(24px,4vw,40px)", paddingTop:20, borderTop:`1px solid ${t.line}` }}>
          <span className="mono" style={{ ...T.eyebrow, color:t.faint }}>MODEL vs MARKET · Calibration Ledger</span>
          <span className="mono" style={{ ...T.eyebrow, color:t.faint }}>Not betting advice — calibration tracking only</span>
        </footer>
      </main>
    </div>
  );
}

/* helpers */
function readEmbedded() {
  try { return JSON.parse(document.getElementById("embedded-ledger").textContent); }
  catch (e) { return []; }
}
function fmtDate(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((dt - today) / 86400000);
  const wd = dt.toLocaleDateString([], { weekday:"short" });
  const md = dt.toLocaleDateString([], { month:"short", day:"numeric" });
  const tag = diff === 0 ? "TODAY" : diff === -1 ? "YESTERDAY" : "";
  return `${tag ? tag + " · " : ""}${wd} ${md}`.toUpperCase();
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
